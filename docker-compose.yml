version: '3.8'

services:
  frontend:
    build: .
    container_name: stock-frontend
    ports:
      - "80:80"
    depends_on:
      - stock-api
      - rag-report
    restart: unless-stopped

  stock-api:
    image: stock-api:latest
    container_name: stock-api
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    env_file:
      - .env
    restart: unless-stopped

  rag-report:
    image: rag-report:latest
    container_name: rag-report
    ports:
      - "8090:8090"
    volumes:
      - rag_data:/app/data
      - qdrant_data:/app/qdrant_data
    env_file:
      - .env
    restart: unless-stopped

volumes:
  rag_data:
  qdrant_data:
